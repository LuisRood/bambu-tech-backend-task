version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-bambu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bambu123}
      POSTGRES_DB: ${DB_NAME:-bambu_tasks}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bambu} -d ${DB_NAME:-bambu_tasks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:postgresql://db:5432/${DB_NAME:-bambu_tasks}}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-bambu}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bambu123}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      JWT_SECRET: ${JWT_SECRET:-YmFtYnUtdGFzay1hcGktc2VjcmV0LWtleS0yMDI2LXN1cGVyLXN0cm9uZw==}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      db:
        condition: service_healthy